name: Actualizar Mapa Bizne PA

on:
  schedule:
    # Cada hora en punto (UTC) — datos frescos de Postgres cada 60 min
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'build_map_v5.py'
      - 'route_builder.js'
      - 'hunters.json'
      - 'data/sid_locations.json'
      - 'bizne_model_ci.py'
      - '.github/workflows/update-map.yml'

jobs:
  update-map:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Paso 1 — Consultar BD via MCP y calcular modelo de demanda
        env:
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
          MCP_URL: "https://mcp.bizne.com.mx/mcp"
          GITHUB_ACTIONS_RUN: "true"
          AIRTABLE_TOKEN:    ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID:  ${{ vars.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_ID: ${{ vars.AIRTABLE_TABLE_ID }}
        run: python bizne_model_ci.py

      - name: Paso 2 — Generar mapa interactivo v5 con datos frescos
        env:
          GITHUB_ACTIONS_RUN: "true"
          RB_API_URL: ${{ vars.RB_API_URL }}
        run: python build_map_v5.py

      - name: Publicar mapa en GitHub Pages
        run: |
          git config user.email "github-actions@bizne.mx"
          git config user.name "Bizne Bot"
          git add index.html
          git diff --staged --quiet && echo "Sin cambios" || git commit -m "Mapa actualizado $(date '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash origin main
          git push
