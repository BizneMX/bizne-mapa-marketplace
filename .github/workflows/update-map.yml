name: Actualizar Mapa Bizne PA

on:
  schedule:
    # Cada hora en punto (UTC) — datos frescos de Postgres cada 60 min
    - cron: '0 * * * *'
  workflow_dispatch:  # Permite correrlo manualmente desde GitHub

jobs:
  update-map:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Paso 1 — Consultar Postgres y calcular modelo de demanda
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_ACTIONS_RUN: "true"
        run: python bizne_model_ci.py

      - name: Paso 2 — Generar mapa interactivo v5 con datos frescos
        env:
          GITHUB_ACTIONS_RUN: "true"
        run: python build_map_v5.py

      - name: Publicar mapa en GitHub Pages
        run: |
          git config user.email "github-actions@bizne.mx"
          git config user.name "Bizne Bot"
          git add index.html
          git diff --staged --quiet && echo "Sin cambios" || git commit -m "Mapa actualizado $(date '+%Y-%m-%d %H:%M UTC')"
          git push
